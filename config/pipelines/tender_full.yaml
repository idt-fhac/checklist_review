name: tender_full
profile: tender
stages:
  - document_loader:
      extraction_method: Extracted Content
      force_execution: false
  - criteria_extractor:
      source: rfp
      output: criteria.yaml
      provider: primary_llm
  - section_mapper:
      strategy: heading_match
  - criterion_evaluator:
      provider: primary_llm
      scoring: pass_fail
      evaluation_mode: multi_persona
      merge_strategy: weighted
      keep_persona_scores: true
      use_search: false
      force_review: true
      personas:
        - id: critic
          label: Black-Hat Evaluator
          weight: 0.35
          prompt_key: critic_system
        - id: expert
          label: Domain Expert
          weight: 0.35
          prompt_key: expert_system
        - id: compliance
          label: Compliance Reviewer
          weight: 0.30
          prompt_key: compliance_system
  - feedback_synthesizer:
      persona: editor
      provider: primary_llm
  - report_writer:
      component: pdf_writer
      formats: [json, pdf]
      save_details: true
