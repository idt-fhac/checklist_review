{% extends "base/base.html" %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reactflow@11.10.1/dist/style.css" />
<link rel="stylesheet" href="{{ url_for('review_process_design.review_process_design_static', filename='css/review_process_design.css') }}" />

<div class="container-fluid py-0" style="flex: 1; overflow: hidden; display: flex; flex-direction: column;">
    <div class="main-container" style="display: flex; flex-direction: column; height: 100%;">
        <div class="bottom-panel" id="bottomPanel" style="display: flex; flex: 1; min-height: 0;">
            <!-- Left: Tools -->
            <div class="tools-sidebar" id="toolsSidebar">
                <!-- Process Selection Section -->
                <div class="process-selection-section">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <label class="fw-bold small mb-0" style="color: #0f172a; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">
                            Review Process
                        </label>
                    </div>
                    <button class="btn btn-sm btn-primary w-100 mb-2" id="createReviewProcessBtn" style="border-radius: 6px; font-weight: 500; padding: 0.5rem;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16" class="me-1">
                            <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
                        </svg>
                        Create Review Process
                    </button>
                    <div class="process-list-container" style="height: 150px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 8px; background: white;">
                        <div class="list-group list-group-flush" id="processListSidebar">
                            <div class="text-center p-3 text-muted small">Loading processes...</div>
                        </div>
                    </div>
                </div>
                
                <!-- Separator -->
                <hr style="margin: 1rem 0; border: 0; border-top: 2px solid #e2e8f0;">
                
                <div id="toolsContainer" class="text-center text-muted small">Loading tools...</div>
                
                <!-- Import Component Button -->
                <div class="mt-3 pt-3 border-top flex-shrink-0">
                    <button class="btn btn-sm w-100 import-component-btn shadow-sm" onclick="if(window.openImportComponentModal) window.openImportComponentModal();" style="border-radius: 8px; font-weight: 600; padding: 0.6rem; border: 1px dashed #94a3b8; background: #f8fafc; color: #475569;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" class="me-1">
                            <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
                            <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/>
                        </svg>
                        Import New Component
                    </button>
                </div>
            </div>

            <!-- Center: Canvas -->
            <div class="process-canvas" id="canvasContainer">
                <div class="canvas-header" id="canvasHeader">
                    <div class="canvas-header-content">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"
                            class="canvas-header-icon">
                            <path
                                d="M14 4.5V14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h5.5zm-3 0A1.5 1.5 0 0 1 9.5 3V1H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V4.5z" />
                        </svg>
                        <div class="canvas-header-text">
                            <div class="canvas-header-label">Review Process</div>
                            <div class="canvas-header-name" id="canvasProcessName">No process selected</div>
                        </div>
                    </div>
                    <div class="d-flex align-items-center gap-2 ms-auto">
                        <button class="btn btn-sm d-flex align-items-center gap-1" id="updateProcessBtn" title="Save Changes" disabled style="padding: 0.375rem 0.75rem; font-size: 0.75rem;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                                <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z" />
                            </svg>
                            <span>Save</span>
                        </button>
                        <button class="btn btn-sm d-flex align-items-center gap-1" id="createProcessBtn" title="Save as New Process" style="padding: 0.375rem 0.75rem; font-size: 0.75rem;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                                <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z" />
                            </svg>
                            <span>Save As...</span>
                        </button>
                        <button class="btn btn-sm d-flex align-items-center gap-1" id="renameProcessBtn" title="Rename Process" disabled style="padding: 0.375rem 0.75rem; font-size: 0.75rem;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                                <path d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708zm.646 6.061L9.793 2.5 3.293 9H3.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.207l6.5-6.5zm-7.468 7.468A.5.5 0 0 1 6 13.5V13h-.5a.5.5 0 0 1-.5-.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.5-.5V10h-.5a.5.5 0 0 1-.175-.032l-.179.178a.5.5 0 0 0 .11.172l2 2a.5.5 0 0 0 .708 0l.13-.13z" />
                            </svg>
                            <span>Rename</span>
                        </button>
                        <button class="btn btn-sm d-flex align-items-center gap-1" id="deleteProcessBtn" title="Delete Process" disabled style="padding: 0.375rem 0.75rem; font-size: 0.75rem;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                                <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z" />
                                <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z" />
                            </svg>
                            <span>Delete</span>
                        </button>
                        <div style="width: 1px; height: 24px; background-color: #e2e8f0; margin: 0 0.25rem;"></div>
                        <button id="fullscreenToggleBtn" class="btn btn-sm btn-outline-secondary shadow-sm"
                            style="border-radius: 6px; padding: 0.25rem 0.5rem; display: flex; align-items: center; gap: 0.25rem; font-size: 0.7rem; border: 1px solid #cbd5e1; background: white; color: #64748b;">
                            <svg id="fullscreenIcon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor"
                                viewBox="0 0 16 16">
                                <path
                                    d="M1.5 1a.5.5 0 0 0-.5.5v4a.5.5 0 0 1-1 0v-4A1.5 1.5 0 0 1 1.5 0h4a.5.5 0 0 1 0 1zM14 1.5a.5.5 0 0 1 .5-.5h4a.5.5 0 0 1 .5.5v4a.5.5 0 0 1-1 0V1.707l-4.146 4.147a.5.5 0 0 1-.708-.708L17.293 1zM1.5 14a.5.5 0 0 1 .5.5v4a.5.5 0 0 1-1 0v-4a.5.5 0 0 1 .5-.5m13 0a.5.5 0 0 1 .5.5v4a.5.5 0 0 1-1 0v-4a.5.5 0 0 1 .5-.5" />
                            </svg>
                            <span id="fullscreenText">Full Screen</span>
                        </button>
                    </div>
                </div>
                <div id="react-flow-root"></div>
                <div id="text-editor-modal-root"></div>
            </div>
        </div>
    </div>
</div>
        </div>
    </div>
</div>

<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "reactflow": "https://esm.sh/reactflow@11.10.1?external=react,react-dom",
    "htm": "https://esm.sh/htm@3.1.1",
    "clsx": "https://esm.sh/clsx@2.0.0"
  }
}
</script>

<script type="module" src="{{ url_for('review_process_design.review_process_design_static', filename='js/review_process_design.js') }}"></script>
{% endblock %}
